name: Build and Push Feed Service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push"
        required: false
        default: "graph-fallback"
      aws_region:
        description: "AWS region"
        required: false
        default: "ap-northeast-1"
      ecr_account:
        description: "AWS ECR account"
        required: false
        default: "025434362120"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      SERVICE: feed-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region || 'ap-northeast-1' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ github.event.inputs.ecr_account || '025434362120' }}

      - name: Build and Push feed-service (linux/amd64)
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag || 'graph-fallback' }}
          AWS_ACCOUNT=${{ github.event.inputs.ecr_account || '025434362120' }}
          AWS_REGION=${{ github.event.inputs.aws_region || 'ap-northeast-1' }}
          ECR_REPO="$AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/nova/feed-service"

          docker buildx build \
            --platform linux/amd64 \
            -t "$ECR_REPO:$IMAGE_TAG" \
            -f backend/feed-service/Dockerfile \
            --push .

      - name: Summary
        run: |
          echo "Pushed: ${{ github.event.inputs.ecr_account || '025434362120' }}.dkr.ecr.${{ github.event.inputs.aws_region || 'ap-northeast-1' }}.amazonaws.com/nova/feed-service:${{ github.event.inputs.image_tag || 'graph-fallback' }}"
